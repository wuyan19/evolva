<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evolva</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body>

  <!-- Mutation space — LLM-generated content lives here (isolated DOM) -->
  <iframe id="mutation-space"></iframe>

  <!-- CORE WINDOW — control panel on top of iframe -->
  <div id="evolva-core" class="evolva-window active" data-protected>
    <div class="window-header">
      <div>
        <h2>Evolva</h2>
        <p></p>
      </div>
      <button id="collapse-toggle">&#9660;</button>
    </div>

    <div id="menu-bar">
      <button class="menu-btn" id="menu-settings"></button>
      <button class="menu-btn" id="menu-import"></button>
      <button class="menu-btn" id="menu-export"></button>
      <button class="menu-btn" id="menu-about"></button>
    </div>

    <div id="log"></div>

    <div id="input-area">
      <textarea id="prompt-input" rows="1"></textarea>
      <button id="send-btn">
        <span id="send-arrow">&uarr;</span>
        <span id="send-spinner" style="display:none">&#x27F3;</span>
      </button>
    </div>

    <div id="context-bar">
      <div id="context-fill"></div>
      <span id="context-text">context 0 / 128k (0%)</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
