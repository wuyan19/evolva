<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evolva</title>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* === Theme Variables === */
    :root {
      --bg-canvas: #0f0f1a;
      --bg-dot: #2a2a4a;
      --text-primary: #e0e0e0;
      --bg-window: #16213e;
      --border: #2a2a4a;
      --border-active: #3a3a5a;
      --bg-header: #1a1a30;
      --accent: #00d4ff;
      --accent-on: #0f0f1a;
      --text-muted: #5a5a7a;
      --bg-input: #0f0f1a;
      --shadow-window: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-active: 0 8px 32px rgba(0,212,255,0.15);
      --btn-bg: #2a2a4a;
      --btn-border: #3a3a5a;
      --log-time: #4a4a6a;
      --color-user: #a78bfa;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    body.light {
      --bg-canvas: #f0f0f5;
      --bg-dot: #d0d0dd;
      --text-primary: #1a1a2e;
      --bg-window: #ffffff;
      --border: #d0d0dd;
      --border-active: #b0b0cc;
      --bg-header: #f5f5fa;
      --accent: #0090cc;
      --accent-on: #ffffff;
      --text-muted: #6a6a8a;
      --bg-input: #ffffff;
      --shadow-window: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-active: 0 8px 32px rgba(0,144,204,0.1);
      --btn-bg: #e0e0ee;
      --btn-border: #c0c0dd;
      --log-time: #8a8aaa;
      --color-user: #7c3aed;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --text-shadow: 0 0 4px rgba(255,255,255,0.8);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-canvas);
      background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-primary);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* Window base styles */
    .evolva-window {
      position: absolute;
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-window);
      display: flex;
      flex-direction: column;
      touch-action: none;
      user-select: none;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .evolva-window.active { box-shadow: var(--shadow-active); border-color: var(--border-active); }

    /* Window header (drag handle) */
    .window-header {
      cursor: move;
      background: var(--bg-header);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .window-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .window-header p {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Core window */
    #evolva-core {
      top: 30px;
      left: 30px;
      width: 460px;
      height: 620px;
      max-height: calc(100vh - 60px);
      z-index: 100;
    }

    /* Settings Dialog */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-dialog {
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: inherit;
      color: var(--text-primary);
    }
    .settings-dialog h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .settings-dialog label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .settings-dialog input, .settings-dialog select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-dialog input:focus, .settings-dialog select:focus {
      border-color: var(--accent);
    }
    .settings-dialog select option {
      background: var(--bg-input);
      color: var(--text-primary);
    }
    .settings-dialog .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Theme toggle row */
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .theme-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .theme-toggle.light::after {
      transform: translateX(20px);
    }

    /* Menu Bar */
    #menu-bar {
      display: flex;
      gap: 2px;
      padding: 4px 14px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .menu-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s, color 0.2s;
    }
    .menu-btn:hover {
      background: var(--btn-bg);
      color: var(--text-primary);
    }

    /* Collapsed state */
    #evolva-core.collapsed {
      width: auto !important;
      height: auto !important;
    }
    #evolva-core.collapsed > #menu-bar,
    #evolva-core.collapsed > #log,
    #evolva-core.collapsed > #input-area,
    #evolva-core.collapsed > #context-bar {
      display: none !important;
    }

    /* Context Bar (status bar at bottom) */
    #context-bar {
      position: relative;
      height: 18px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
      transition: background 0.3s;
    }
    #context-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s, background 0.4s;
      width: 0%;
    }
    #context-fill.warning { background: var(--color-warning); }
    #context-fill.danger { background: var(--color-error); }
    #context-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      color: var(--text-primary);
      font-family: monospace;
      white-space: nowrap;
      text-shadow: var(--text-shadow);
    }

    /* Log Area */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      user-select: text;
      -webkit-user-select: text;
      min-height: 120px;
    }
    .log-entry {
      margin-bottom: 3px;
      word-wrap: break-word;
    }
    .log-time {
      color: var(--log-time);
      margin-right: 6px;
    }
    .log-actor {
      font-weight: 600;
      margin-right: 6px;
    }
    .log-actor.system { color: var(--accent); }
    .log-actor.user { color: var(--color-user); }
    .log-actor.error { color: var(--color-error); }

    /* Input Area */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 10px 14px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #prompt {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 36px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.3s;
    }
    #prompt:focus { border-color: var(--accent); }
    #send {
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.85; }
    #send.loading { opacity: 0.6; cursor: not-allowed; }
    #send-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Collapse toggle button */
    #collapse-toggle {
      background: var(--btn-bg);
      color: var(--text-primary);
      border: 1px solid var(--btn-border);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s;
      line-height: 1;
    }
    #collapse-toggle:hover { background: var(--btn-border); }
  </style>
</head>
<body>

  <!-- CORE WINDOW -->
  <div id="evolva-core" class="evolva-window active" data-protected>
    <div class="window-header">
      <div>
        <h2>Evolva</h2>
        <p>self-evolving application</p>
      </div>
      <button id="collapse-toggle">&#9660;</button>
    </div>

    <div id="menu-bar">
      <button class="menu-btn" id="menu-settings">Settings</button>
      <button class="menu-btn" id="menu-import">Import</button>
      <button class="menu-btn" id="menu-export">Export</button>
      <button class="menu-btn" id="menu-about">About</button>
    </div>

    <div id="log"></div>

    <div id="input-area">
      <textarea id="prompt" placeholder="Enter mutation instruction..." rows="1"></textarea>
      <button id="send">
        <span id="send-arrow">&rarr;</span>
        <span id="send-spinner" style="display:none">&#x27F3;</span>
      </button>
    </div>

    <div id="context-bar">
      <div id="context-fill"></div>
      <span id="context-text">context 0 / 128k (0%)</span>
    </div>
  </div>

  <script type="text/plain" id="system-prompt">You are Evolva, a self-evolving application. Your job is to modify the webpage based on user instructions.

**CRITICAL — NEVER modify, remove, or hide any element with `data-protected` attribute, nor any of its descendants. This includes the entire #evolva-core control panel (menu bar, log, input area, context bar). NEVER modify overlay/modal elements either (settings dialog, about dialog, confirm dialogs). Violating this rule breaks the application.**

Notes:
- The log area only shows the last 10 entries — this is intentional truncation, not a bug
- #evolva-core may appear collapsed (menu bar, log, input hidden) — this is a toggle state, do not "fix" it

Rules:
1. Generate ONLY a ```javascript code block — no explanations before or after
2. When creating new UI elements, wrap them in a draggable window:
   - Create a div with class="evolva-window" with position:absolute, set explicit top/left/width/height
   - .evolva-window uses flex column layout — content flows vertically by default
   - Add a child div with class="window-header" as the drag handle, include an h2 title inside
   - Call setupDraggable(newElement) to enable drag/resize
   - Set mousedown listener: el.addEventListener('mousedown', () => bringToFront(el))
   - bringToFront(el) sets the window as active (adds .active class for highlight border/shadow)
3. For keyboard input (games, shortcuts), use onActiveKeydown(windowEl, handler) and onActiveKeyup(windowEl, handler). These only fire when the window is active. Do NOT use document.addEventListener('keydown') directly
4. Use `import` from `https://esm.sh/` for external libraries
5. Use CSS variables to match the theme: --accent, --bg-window, --bg-header, --bg-input, --border, --text-primary, --text-muted, --btn-bg, --btn-border, --color-error, --color-warning
6. Keep code concise to save token space</script>

  <script>
    // Tauri environment check
    if (!window.__TAURI__) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e0e0e0;font-family:monospace;background:#0f0f1a"><p>Evolva must run inside Tauri. Use: <code>cargo tauri dev</code></p></div>';
      throw new Error('Not running in Tauri');
    }

    const { invoke } = window.__TAURI__.core;

    // DOM refs
    const coreWindow = document.getElementById('evolva-core');
    const collapseToggle = document.getElementById('collapse-toggle');
    const menuSettings = document.getElementById('menu-settings');
    const menuImport = document.getElementById('menu-import');
    const menuExport = document.getElementById('menu-export');
    const contextFill = document.getElementById('context-fill');
    const contextText = document.getElementById('context-text');
    const logEl = document.getElementById('log');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const sendArrow = document.getElementById('send-arrow');
    const sendSpinner = document.getElementById('send-spinner');

    let processing = false;
    let topZ = 100;

    // --- Theme ---
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      localStorage.setItem('evolva_theme', light ? 'light' : 'dark');
    }

    function loadTheme() {
      const saved = localStorage.getItem('evolva_theme');
      applyTheme(saved === 'light');
    }

    // --- Drag & Resize (interact.js) ---
    function setupDraggable(el) {
      interact(el)
        .draggable({
          allowFrom: '.window-header',
          inertia: true,
          modifiers: [
            interact.modifiers.restrictRect({
              restriction: 'parent',
              endOnly: true
            })
          ],
          listeners: {
            move(event) {
              var target = event.target;
              var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
              var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
              target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
              target.setAttribute('data-x', x);
              target.setAttribute('data-y', y);
            }
          }
        })
        .resizable({
          edges: { left: false, right: true, bottom: true, top: false },
          listeners: {
            move(event) {
              var target = event.target;
              var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.deltaRect.left;
              var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.deltaRect.top;
              target.style.width = event.rect.width + 'px';
              target.style.height = event.rect.height + 'px';
              target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
              target.setAttribute('data-x', x);
              target.setAttribute('data-y', y);
            }
          }
        });
    }

    // Bring window to front on click
    function bringToFront(el) {
      topZ++;
      el.style.zIndex = topZ;
      document.querySelectorAll('.evolva-window').forEach(function(w) {
        w.classList.remove('active');
      });
      el.classList.add('active');
    }

    document.querySelectorAll('.evolva-window').forEach(function(w) {
      w.addEventListener('mousedown', function() { bringToFront(w); });
    });

    // Setup core window
    setupDraggable(coreWindow);

    // Make setupDraggable globally available for LLM-generated code
    window.setupDraggable = setupDraggable;
    window.bringToFront = bringToFront;

    // --- Keyboard Focus Router ---
    // Maps window element -> { keydown: [callbacks], keyup: [callbacks] }
    const windowKeyHandlers = new Map();

    // Register keyboard handlers scoped to a window (only fires when that window is active)
    window.onActiveKeydown = function(windowEl, handler) {
      if (!windowKeyHandlers.has(windowEl)) {
        windowKeyHandlers.set(windowEl, { keydown: [], keyup: [] });
      }
      windowKeyHandlers.get(windowEl).keydown.push(handler);
    };

    window.onActiveKeyup = function(windowEl, handler) {
      if (!windowKeyHandlers.has(windowEl)) {
        windowKeyHandlers.set(windowEl, { keydown: [], keyup: [] });
      }
      windowKeyHandlers.get(windowEl).keyup.push(handler);
    };

    // Route global keyboard events to the active window's handlers only
    document.addEventListener('keydown', function(e) {
      // Don't intercept when typing in inputs/textareas
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      const activeWin = document.querySelector('.evolva-window.active');
      if (!activeWin) return;
      const handlers = windowKeyHandlers.get(activeWin);
      if (handlers) {
        handlers.keydown.forEach(function(fn) { fn(e); });
      }
    });

    document.addEventListener('keyup', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      const activeWin = document.querySelector('.evolva-window.active');
      if (!activeWin) return;
      const handlers = windowKeyHandlers.get(activeWin);
      if (handlers) {
        handlers.keyup.forEach(function(fn) { fn(e); });
      }
    });

    // --- Log ---
    function log(actor, message) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = new Date().toLocaleTimeString();
      const actorEl = document.createElement('span');
      actorEl.className = 'log-actor ' + actor;
      actorEl.textContent = actor;
      const msg = document.createElement('span');
      msg.textContent = message;
      entry.appendChild(time);
      entry.appendChild(actorEl);
      entry.appendChild(msg);
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // --- Settings ---
    function loadSettings() {
      // Settings are loaded from localStorage when dialog opens
    }

    function saveSettings() {
      const dialog = document.querySelector('.settings-dialog');
      if (!dialog) return;
      localStorage.setItem('evolva_key', dialog.querySelector('#dlg-api-key').value.trim());
      localStorage.setItem('evolva_base', dialog.querySelector('#dlg-base-url').value.trim());
      localStorage.setItem('evolva_model', dialog.querySelector('#dlg-model').value.trim());
      localStorage.setItem('evolva_protocol', dialog.querySelector('#dlg-protocol').value);
      log('system', 'Settings saved.');
      dialog.closest('.settings-overlay').remove();
    }

    function showSettingsDialog() {
      const overlay = document.createElement('div');
      overlay.className = 'settings-overlay';
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

      const dlg = document.createElement('div');
      dlg.className = 'settings-dialog';
      const isLight = document.body.classList.contains('light');
      dlg.innerHTML =
        '<h3>Settings</h3>' +
        '<label>API Key</label>' +
        '<input type="password" id="dlg-api-key" placeholder="sk-..." value="">' +
        '<label>Base URL</label>' +
        '<input type="text" id="dlg-base-url" placeholder="https://api.openai.com/v1" value="">' +
        '<label>Protocol</label>' +
        '<select id="dlg-protocol"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option></select>' +
        '<label>Model</label>' +
        '<input type="text" id="dlg-model" placeholder="gpt-4o" value="">' +
        '<div class="theme-row"><label>Theme</label><div id="dlg-theme" class="theme-toggle' + (isLight ? ' light' : '') + '"></div></div>' +
        '<div style="display:flex;gap:8px;margin-top:4px">' +
        '<button id="dlg-save" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">Save</button>' +
        '<button id="dlg-cancel" style="background:var(--btn-bg);color:var(--text-primary);border:1px solid var(--btn-border);padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;">Cancel</button>' +
        '</div>';

      overlay.appendChild(dlg);
      document.body.appendChild(overlay);

      // Load current values
      dlg.querySelector('#dlg-api-key').value = localStorage.getItem('evolva_key') || '';
      dlg.querySelector('#dlg-base-url').value = localStorage.getItem('evolva_base') || '';
      dlg.querySelector('#dlg-model').value = localStorage.getItem('evolva_model') || '';
      dlg.querySelector('#dlg-protocol').value = localStorage.getItem('evolva_protocol') || 'openai';

      // Theme toggle inside dialog
      dlg.querySelector('#dlg-theme').addEventListener('click', function() {
        const nowLight = !document.body.classList.contains('light');
        applyTheme(nowLight);
        this.classList.toggle('light', nowLight);
      });

      dlg.querySelector('#dlg-save').addEventListener('click', saveSettings);
      dlg.querySelector('#dlg-cancel').addEventListener('click', () => overlay.remove());
    }

    // --- Collapse Toggle ---
    collapseToggle.addEventListener('click', () => {
      const isCollapsed = coreWindow.classList.toggle('collapsed');
      collapseToggle.innerHTML = isCollapsed ? '&#9654;' : '&#9660;';
    });

    // --- Menu Bar ---
    menuSettings.addEventListener('click', () => {
      showSettingsDialog();
    });

    // --- About ---
    document.getElementById('menu-about').addEventListener('click', () => {
      showAboutDialog();
    });

    async function showAboutDialog() {
      const version = await invoke('get_version');
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';

      const dialog = document.createElement('div');
      dialog.style.cssText = 'background:var(--bg-window);border:1px solid var(--border);border-radius:10px;padding:24px 28px;max-width:320px;text-align:center;font-family:inherit;color:var(--text-primary);';
      dialog.innerHTML =
        '<h3 style="margin:0 0 4px;font-size:16px;color:var(--accent);letter-spacing:1px;">Evolva</h3>' +
        '<p style="margin:0 0 4px;font-size:11px;color:var(--text-muted);">self-evolving application</p>' +
        '<p style="margin:0 0 16px;font-size:11px;color:var(--text-muted);">v' + version + '</p>' +
        '<button id="about-close" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">OK</button>';

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);

      dialog.querySelector('#about-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    // --- Export / Import ---
    const { save, open } = window.__TAURI__.dialog;

    async function exportApp() {
      try {
        const count = await invoke('get_mutation_count');
        if (count === 0) {
          log('error', 'No mutations to export');
          return;
        }

        const filePath = await save({
          defaultPath: 'app.evolva.json',
          filters: [{ name: 'Evolva JSON', extensions: ['json'] }]
        });

        if (!filePath) return;

        const name = filePath.split(/[\\/]/).pop().replace('.evolva.json', '').replace('.json', '');
        await invoke('export_app', { path: filePath, name });
        log('system', 'App exported (' + count + ' versions).');
      } catch (err) {
        log('error', 'Export failed: ' + String(err));
      }
    }

    async function importApp() {
      try {
        const count = await invoke('get_mutation_count');
        if (count > 0) {
          const confirmed = await showConfirmDialog(count);
          if (!confirmed) return;
        }

        const selected = await open({
          filters: [{ name: 'Evolva JSON', extensions: ['json'] }],
          multiple: false
        });

        if (!selected) return;

        const codes = await invoke('import_app', { path: selected });

        // Clear non-core DOM elements
        const toRemove = [];
        document.body.childNodes.forEach(child => {
          if (child.nodeType === 1 && child.id !== 'evolva-core') {
            toRemove.push(child);
          }
        });
        toRemove.forEach(el => el.remove());

        // Remove extra head styles (keep first)
        const headStyles = document.head.querySelectorAll('style');
        headStyles.forEach((style, i) => {
          if (i > 0) style.remove();
        });

        // Replay all versions in order
        for (const code of codes) {
          injectCode(code);
        }
        updateContext();
        log('system', 'App imported (' + codes.length + ' versions replayed).');
      } catch (err) {
        log('error', 'Import failed: ' + String(err));
      }
    }

    // --- Confirm Dialog ---
    function showConfirmDialog(count) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.id = 'confirm-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';

        const dialog = document.createElement('div');
        dialog.style.cssText = 'background:var(--bg-window);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:360px;text-align:center;font-family:inherit;color:var(--text-primary);';
        dialog.innerHTML = '<p style="margin-bottom:16px;font-size:13px;line-height:1.5;">当前会话有 <strong>' + count + '</strong> 个版本未导出，导入将覆盖当前状态。是否继续？</p>' +
          '<div style="display:flex;gap:10px;justify-content:center;">' +
          '<button id="confirm-cancel" style="background:var(--btn-bg);color:var(--text-primary);border:1px solid var(--btn-border);padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;">取消</button>' +
          '<button id="confirm-ok" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">确认</button>' +
          '</div>';

        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        dialog.querySelector('#confirm-ok').addEventListener('click', () => {
          overlay.remove();
          resolve(true);
        });
        dialog.querySelector('#confirm-cancel').addEventListener('click', () => {
          overlay.remove();
          resolve(false);
        });
      });
    }

    menuExport.addEventListener('click', exportApp);
    menuImport.addEventListener('click', importApp);

    // --- Context Bar ---
    function updateContext() {
      const dom = document.documentElement.outerHTML;
      const tokens = Math.round(dom.length / 4);
      const maxTokens = 128000;
      const pct = Math.min((tokens / maxTokens) * 100, 100);
      contextFill.style.width = pct + '%';
      contextText.textContent = 'context ' + tokens + ' / 128k (' + pct.toFixed(1) + '%)';
      contextFill.classList.remove('warning', 'danger');
      if (pct > 96) contextFill.classList.add('danger');
      else if (pct > 72) contextFill.classList.add('warning');
    }

    // --- DOM Capture ---
    function captureDom() {
      let html = document.documentElement.outerHTML;

      // 1. Strip system prompt first
      html = html.replace(
        /<script type="text\/plain" id="system-prompt">[\s\S]*?<\/script>/,
        '<!-- system prompt omitted -->'
      );

      // 2. Strip all remaining <script> tags
      html = html.replace(/<script[\s\S]*?<\/script>/gi, '');

      // 3. Truncate log entries to last 10
      while (logEl.children.length > 10) {
        logEl.removeChild(logEl.children[0]);
      }

      return html;
    }

    // --- Code Extraction ---
    function extractCode(response) {
      const patterns = [
        /```(?:javascript|js|jsx|ts|typescript)?\s*\n([\s\S]*?)```/,
        /~~~(?:javascript|js|jsx|ts|typescript)?\s*\n([\s\S]*?)~~~/,
      ];
      for (const pattern of patterns) {
        const match = response.match(pattern);
        if (match) return match[1].trim();
      }
      return null;
    }

    // --- Script Injection ---
    function injectCode(code) {
      code = code.replace(
        /(?:const|let|var)\s+(\w+)\s*=\s*require\(['"]([\w@/.\\-]+)['"]\)/g,
        'const $1 = (await import("https://esm.sh/$2"))'
      );
      code = code.replace(
        /require\(['"]([\w@/.\\-]+)['"]\)/g,
        '(await import("https://esm.sh/$1"))'
      );

      const script = document.createElement('script');
      script.textContent = '(async () => {\n' + code + '\n})();';
      document.body.appendChild(script);
      script.remove();
    }

    // --- Mutation Loop ---
    async function mutate() {
      if (processing) return;

      const apiKey = (localStorage.getItem('evolva_key') || '').trim();
      const baseUrl = (localStorage.getItem('evolva_base') || '').trim();
      const model = (localStorage.getItem('evolva_model') || '').trim();
      const protocol = (localStorage.getItem('evolva_protocol') || 'openai').trim();

      if (!apiKey && !baseUrl) {
        log('error', 'Configure settings first');
        return;
      }

      const userMsg = promptEl.value.trim();
      if (!userMsg) return;

      processing = true;
      sendBtn.classList.add('loading');
      sendArrow.style.display = 'none';
      sendSpinner.style.display = 'inline';
      promptEl.disabled = true;

      try {
        log('user', userMsg);

        const systemPrompt = document.getElementById('system-prompt').textContent;
        const dom = captureDom();

        const result = await invoke('call_llm', {
          req: {
            protocol,
            api_key: apiKey,
            base_url: baseUrl,
            model,
            system: systemPrompt,
            user: 'Current DOM:\n```\n' + dom + '\n```\n\nUser instruction: ' + userMsg,
          },
        });

        const code = extractCode(result);
        if (!code) {
          log('error', 'No JavaScript code block found');
          console.log('LLM response:', result);
          return;
        }

        injectCode(code);
        await invoke('save_mutation', { instruction: userMsg, code });
        log('system', 'Mutation applied.');
        promptEl.value = '';
        promptEl.style.height = 'auto';
        updateContext();
      } catch (err) {
        log('error', String(err));
      } finally {
        processing = false;
        sendBtn.classList.remove('loading');
        sendArrow.style.display = 'inline';
        sendSpinner.style.display = 'none';
        promptEl.disabled = false;
      }
    }

    // --- Event Handlers ---
    sendBtn.addEventListener('click', mutate);

    promptEl.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        mutate();
      }
    });

    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + 'px';
    });

    // --- Init ---
    loadTheme();
    loadSettings();
    updateContext();
    log('system', 'Evolva initialized. Configure settings to begin.');
  </script>
</body>
</html>
