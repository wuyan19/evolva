<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evolva</title>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* === Theme Variables === */
    :root {
      --bg-canvas: #0f0f1a;
      --bg-dot: #2a2a4a;
      --text-primary: #e0e0e0;
      --bg-window: #16213e;
      --border: #2a2a4a;
      --border-active: #3a3a5a;
      --bg-header: #1a1a30;
      --accent: #00d4ff;
      --accent-on: #0f0f1a;
      --text-muted: #5a5a7a;
      --bg-input: #0f0f1a;
      --shadow-window: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-active: 0 8px 32px rgba(0,212,255,0.15);
      --btn-bg: #2a2a4a;
      --btn-border: #3a3a5a;
      --log-time: #4a4a6a;
      --color-user: #a78bfa;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    body.light {
      --bg-canvas: #f0f0f5;
      --bg-dot: #d0d0dd;
      --text-primary: #1a1a2e;
      --bg-window: #ffffff;
      --border: #d0d0dd;
      --border-active: #b0b0cc;
      --bg-header: #f5f5fa;
      --accent: #0090cc;
      --accent-on: #ffffff;
      --text-muted: #6a6a8a;
      --bg-input: #ffffff;
      --shadow-window: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-active: 0 8px 32px rgba(0,144,204,0.1);
      --btn-bg: #e0e0ee;
      --btn-border: #c0c0dd;
      --log-time: #8a8aaa;
      --color-user: #7c3aed;
      --color-error: #dc2626;
      --color-warning: #d97706;
      --text-shadow: 0 0 4px rgba(255,255,255,0.8);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-canvas);
      background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-primary);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* Mutation space iframe — full page behind evolva-core */
    #mutation-space {
      position: fixed;
      inset: 0;
      border: none;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    /* Window base styles */
    .evolva-window {
      position: absolute;
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-window);
      display: flex;
      flex-direction: column;
      touch-action: none;
      user-select: none;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .evolva-window.active { box-shadow: var(--shadow-active); border-color: var(--border-active); }

    /* Window header (drag handle) */
    .window-header {
      cursor: move;
      background: var(--bg-header);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .window-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .window-header p {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Core window */
    #evolva-core {
      top: 30px;
      left: 30px;
      width: 460px;
      height: 620px;
      max-height: calc(100vh - 60px);
      z-index: 100;
    }

    /* Settings Dialog */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-dialog {
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      width: 440px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: inherit;
      color: var(--text-primary);
    }
    .settings-dialog h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .settings-dialog label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .settings-dialog input, .settings-dialog select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-dialog input:focus, .settings-dialog select:focus {
      border-color: var(--accent);
    }
    .settings-dialog select option {
      background: var(--bg-input);
      color: var(--text-primary);
    }
    .settings-dialog .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Theme toggle row */
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .theme-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .theme-toggle.light::after {
      transform: translateX(20px);
    }

    /* Menu Bar */
    #menu-bar {
      display: flex;
      gap: 2px;
      padding: 4px 14px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .menu-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s, color 0.2s;
    }
    .menu-btn:hover {
      background: var(--btn-bg);
      color: var(--text-primary);
    }

    /* Collapsed state */
    #evolva-core.collapsed {
      width: auto !important;
      height: auto !important;
    }
    #evolva-core.collapsed > #menu-bar,
    #evolva-core.collapsed > #log,
    #evolva-core.collapsed > #input-area,
    #evolva-core.collapsed > #context-bar {
      display: none !important;
    }

    /* Context Bar (status bar at bottom) */
    #context-bar {
      position: relative;
      height: 18px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
      transition: background 0.3s;
    }
    #context-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s, background 0.4s;
      width: 0%;
    }
    #context-fill.warning { background: var(--color-warning); }
    #context-fill.danger { background: var(--color-error); }
    #context-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      color: var(--text-primary);
      font-family: monospace;
      white-space: nowrap;
      text-shadow: var(--text-shadow);
    }

    /* Log Area */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      user-select: text;
      -webkit-user-select: text;
      min-height: 120px;
    }
    .log-entry {
      margin-bottom: 3px;
      word-wrap: break-word;
    }
    .log-time {
      color: var(--log-time);
      margin-right: 6px;
    }
    .log-actor {
      font-weight: 600;
      margin-right: 6px;
    }
    .log-actor.system { color: var(--accent); }
    .log-actor.user { color: var(--color-user); }
    .log-actor.error { color: var(--color-error); }

    /* Input Area */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 10px 14px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #prompt {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 36px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.3s;
    }
    #prompt:focus { border-color: var(--accent); }
    #send {
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.85; }
    #send.loading { opacity: 0.6; cursor: not-allowed; }
    #send-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Collapse toggle button */
    #collapse-toggle {
      background: var(--btn-bg);
      color: var(--text-primary);
      border: 1px solid var(--btn-border);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s;
      line-height: 1;
    }
    #collapse-toggle:hover { background: var(--btn-border); }
  </style>
</head>
<body>

  <!-- Mutation space — LLM-generated content lives here (isolated DOM) -->
  <iframe id="mutation-space"></iframe>

  <!-- CORE WINDOW — control panel on top of iframe -->
  <div id="evolva-core" class="evolva-window active" data-protected>
    <div class="window-header">
      <div>
        <h2>Evolva</h2>
        <p>self-evolving application</p>
      </div>
      <button id="collapse-toggle">&#9660;</button>
    </div>

    <div id="menu-bar">
      <button class="menu-btn" id="menu-settings">Settings</button>
      <button class="menu-btn" id="menu-import">Import</button>
      <button class="menu-btn" id="menu-export">Export</button>
      <button class="menu-btn" id="menu-about">About</button>
    </div>

    <div id="log"></div>

    <div id="input-area">
      <textarea id="prompt" placeholder="Enter mutation instruction..." rows="1"></textarea>
      <button id="send">
        <span id="send-arrow">&rarr;</span>
        <span id="send-spinner" style="display:none">&#x27F3;</span>
      </button>
    </div>

    <div id="context-bar">
      <div id="context-fill"></div>
      <span id="context-text">context 0 / 128k (0%)</span>
    </div>
  </div>

  <script>
    // Tauri environment check
    if (!window.__TAURI__) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e0e0e0;font-family:monospace;background:#0f0f1a"><p>Evolva must run inside Tauri. Use: <code>cargo tauri dev</code></p></div>';
      throw new Error('Not running in Tauri');
    }

    const { invoke } = window.__TAURI__.core;

    // DOM refs
    const mutationFrame = document.getElementById('mutation-space');
    const coreWindow = document.getElementById('evolva-core');
    const collapseToggle = document.getElementById('collapse-toggle');
    const menuSettings = document.getElementById('menu-settings');
    const menuImport = document.getElementById('menu-import');
    const menuExport = document.getElementById('menu-export');
    const contextFill = document.getElementById('context-fill');
    const contextText = document.getElementById('context-text');
    const logEl = document.getElementById('log');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const sendArrow = document.getElementById('send-arrow');
    const sendSpinner = document.getElementById('send-spinner');

    let processing = false;
    let mutationSpaceReady = false;

    // --- Mutation Space (iframe initialization) ---
    function initMutationSpace() {
      const css = document.head.querySelector('style').textContent;
      const doc = mutationFrame.contentDocument;

      doc.open();
      doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + css + '</style></head>' +
        '<body style="margin:0;padding:0;overflow:hidden;height:100vh;width:100vw;position:relative;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;' +
        'background:var(--bg-canvas);background-image:radial-gradient(var(--bg-dot) 1px,transparent 1px);background-size:20px 20px;color:var(--text-primary);"></body></html>');
      doc.close();

      // Load interact.js into iframe
      var script = doc.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js';
      script.onload = function() {
        setupMutationHelpers();
        mutationSpaceReady = true;
      };
      doc.head.appendChild(script);

      // Sync initial theme
      if (document.body.classList.contains('light')) {
        doc.documentElement.classList.add('light');
        doc.body.classList.add('light');
      }
    }

    function setupMutationHelpers() {
      var win = mutationFrame.contentWindow;
      var doc = mutationFrame.contentDocument;
      var topZ = 100;

      // setupDraggable
      win.setupDraggable = function(el) {
        win.interact(el)
          .draggable({
            allowFrom: '.window-header',
            inertia: true,
            modifiers: [
              win.interact.modifiers.restrictRect({ restriction: 'parent', endOnly: true })
            ],
            listeners: {
              move: function(event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = 'translate(' + x + 'px,' + y + 'px)';
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          })
          .resizable({
            edges: { left: false, right: true, bottom: true, top: false },
            listeners: {
              move: function(event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.deltaRect.left;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.deltaRect.top;
                target.style.width = event.rect.width + 'px';
                target.style.height = event.rect.height + 'px';
                target.style.transform = 'translate(' + x + 'px,' + y + 'px)';
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          });
      };

      // bringToFront
      win.bringToFront = function(el) {
        topZ++;
        el.style.zIndex = topZ;
        doc.querySelectorAll('.evolva-window').forEach(function(w) { w.classList.remove('active'); });
        el.classList.add('active');
      };

      // Keyboard focus router
      var keyHandlers = new Map();

      win.onActiveKeydown = function(windowEl, handler) {
        if (!keyHandlers.has(windowEl)) keyHandlers.set(windowEl, { keydown: [], keyup: [] });
        keyHandlers.get(windowEl).keydown.push(handler);
      };
      win.onActiveKeyup = function(windowEl, handler) {
        if (!keyHandlers.has(windowEl)) keyHandlers.set(windowEl, { keydown: [], keyup: [] });
        keyHandlers.get(windowEl).keyup.push(handler);
      };

      doc.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        var activeWin = doc.querySelector('.evolva-window.active');
        if (!activeWin) return;
        var handlers = keyHandlers.get(activeWin);
        if (handlers) handlers.keydown.forEach(function(fn) { fn(e); });
      });
      doc.addEventListener('keyup', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        var activeWin = doc.querySelector('.evolva-window.active');
        if (!activeWin) return;
        var handlers = keyHandlers.get(activeWin);
        if (handlers) handlers.keyup.forEach(function(fn) { fn(e); });
      });
    }

    // --- Theme ---
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      localStorage.setItem('evolva_theme', light ? 'light' : 'dark');
      // Sync to iframe
      if (mutationSpaceReady) {
        var iframeDoc = mutationFrame.contentDocument;
        iframeDoc.documentElement.classList.toggle('light', light);
        iframeDoc.body.classList.toggle('light', light);
      }
    }

    function loadTheme() {
      var saved = localStorage.getItem('evolva_theme');
      applyTheme(saved === 'light');
    }

    // --- Drag for evolva-core (main page only) ---
    function setupDraggable(el) {
      interact(el)
        .draggable({
          allowFrom: '.window-header',
          inertia: true,
          modifiers: [
            interact.modifiers.restrictRect({ restriction: 'parent', endOnly: true })
          ],
          listeners: {
            move: function(event) {
              var target = event.target;
              var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
              var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
              target.style.transform = 'translate(' + x + 'px,' + y + 'px)';
              target.setAttribute('data-x', x);
              target.setAttribute('data-y', y);
            }
          }
        })
        .resizable({
          edges: { left: false, right: true, bottom: true, top: false },
          listeners: {
            move: function(event) {
              var target = event.target;
              var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.deltaRect.left;
              var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.deltaRect.top;
              target.style.width = event.rect.width + 'px';
              target.style.height = event.rect.height + 'px';
              target.style.transform = 'translate(' + x + 'px,' + y + 'px)';
              target.setAttribute('data-x', x);
              target.setAttribute('data-y', y);
            }
          }
        });
    }

    setupDraggable(coreWindow);

    function bringToFront(el) {
      el.style.zIndex = 100;
      document.querySelectorAll('.evolva-window').forEach(function(w) { w.classList.remove('active'); });
      el.classList.add('active');
    }

    document.querySelectorAll('.evolva-window').forEach(function(w) {
      w.addEventListener('mousedown', function() { bringToFront(w); });
    });

    // --- Log ---
    function log(actor, message) {
      var entry = document.createElement('div');
      entry.className = 'log-entry';
      var time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = new Date().toLocaleTimeString();
      var actorEl = document.createElement('span');
      actorEl.className = 'log-actor ' + actor;
      actorEl.textContent = actor;
      var msg = document.createElement('span');
      msg.textContent = message;
      entry.appendChild(time);
      entry.appendChild(actorEl);
      entry.appendChild(msg);
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // --- Settings (backend-managed) ---
    async function showSettingsDialog() {
      var settings;
      try {
        settings = await invoke('load_settings');
      } catch (err) {
        settings = { api_key: '', base_url: '', model: '', protocol: 'openai' };
      }

      var overlay = document.createElement('div');
      overlay.className = 'settings-overlay';
      var dlg = document.createElement('div');
      dlg.className = 'settings-dialog';
      var isLight = document.body.classList.contains('light');
      dlg.innerHTML =
        '<h3>Settings</h3>' +
        '<label>API Key</label>' +
        '<input type="password" id="dlg-api-key" placeholder="sk-..." value="">' +
        '<label>Base URL</label>' +
        '<input type="text" id="dlg-base-url" placeholder="https://api.openai.com/v1" value="">' +
        '<label>Protocol</label>' +
        '<select id="dlg-protocol"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option></select>' +
        '<label>Model</label>' +
        '<input type="text" id="dlg-model" placeholder="gpt-4o" value="">' +
        '<div class="theme-row"><label>Theme</label><div id="dlg-theme" class="theme-toggle' + (isLight ? ' light' : '') + '"></div></div>' +
        '<div style="display:flex;gap:8px;margin-top:4px">' +
        '<button id="dlg-save" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">Save</button>' +
        '<button id="dlg-cancel" style="background:var(--btn-bg);color:var(--text-primary);border:1px solid var(--btn-border);padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;">Cancel</button>' +
        '</div>';

      overlay.appendChild(dlg);
      document.body.appendChild(overlay);

      dlg.querySelector('#dlg-api-key').value = settings.api_key || '';
      dlg.querySelector('#dlg-base-url').value = settings.base_url || '';
      dlg.querySelector('#dlg-model').value = settings.model || '';
      dlg.querySelector('#dlg-protocol').value = settings.protocol || 'openai';

      dlg.querySelector('#dlg-theme').addEventListener('click', function() {
        var nowLight = !document.body.classList.contains('light');
        applyTheme(nowLight);
        this.classList.toggle('light', nowLight);
      });

      dlg.querySelector('#dlg-save').addEventListener('click', async function() {
        try {
          await invoke('save_settings', {
            settings: {
              api_key: dlg.querySelector('#dlg-api-key').value.trim(),
              base_url: dlg.querySelector('#dlg-base-url').value.trim(),
              model: dlg.querySelector('#dlg-model').value.trim(),
              protocol: dlg.querySelector('#dlg-protocol').value,
            }
          });
          log('system', 'Settings saved.');
          overlay.remove();
        } catch (err) {
          log('error', 'Failed to save settings: ' + String(err));
        }
      });

      dlg.querySelector('#dlg-cancel').addEventListener('click', function() { overlay.remove(); });
    }

    // --- Collapse Toggle ---
    collapseToggle.addEventListener('click', function() {
      var isCollapsed = coreWindow.classList.toggle('collapsed');
      collapseToggle.innerHTML = isCollapsed ? '&#9654;' : '&#9660;';
    });

    // --- Menu Bar ---
    menuSettings.addEventListener('click', function() { showSettingsDialog(); });

    // --- About ---
    document.getElementById('menu-about').addEventListener('click', function() { showAboutDialog(); });

    async function showAboutDialog() {
      var version = await invoke('get_version');
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';

      var dialog = document.createElement('div');
      dialog.style.cssText = 'background:var(--bg-window);border:1px solid var(--border);border-radius:10px;padding:24px 28px;max-width:320px;text-align:center;font-family:inherit;color:var(--text-primary);';
      dialog.innerHTML =
        '<h3 style="margin:0 0 4px;font-size:16px;color:var(--accent);letter-spacing:1px;">Evolva</h3>' +
        '<p style="margin:0 0 4px;font-size:11px;color:var(--text-muted);">self-evolving application</p>' +
        '<p style="margin:0 0 16px;font-size:11px;color:var(--text-muted);">v' + version + '</p>' +
        '<button id="about-close" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">OK</button>';

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);

      dialog.querySelector('#about-close').addEventListener('click', function() { overlay.remove(); });
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    }

    // --- Export / Import ---
    var tauriDialog = window.__TAURI__.dialog;

    async function exportApp() {
      try {
        var count = await invoke('get_mutation_count');
        if (count === 0) {
          log('error', 'No mutations to export');
          return;
        }

        var filePath = await tauriDialog.save({
          defaultPath: 'app.evolva.json',
          filters: [{ name: 'Evolva JSON', extensions: ['json'] }]
        });

        if (!filePath) return;

        var name = filePath.split(/[\\/]/).pop().replace('.evolva.json', '').replace('.json', '');
        await invoke('export_app', { path: filePath, name: name });
        log('system', 'App exported (' + count + ' versions).');
      } catch (err) {
        log('error', 'Export failed: ' + String(err));
      }
    }

    async function importApp() {
      try {
        var count = await invoke('get_mutation_count');
        if (count > 0) {
          var confirmed = await showConfirmDialog(count);
          if (!confirmed) return;
        }

        var selected = await tauriDialog.open({
          filters: [{ name: 'Evolva JSON', extensions: ['json'] }],
          multiple: false
        });

        if (!selected) return;

        var codes = await invoke('import_app', { path: selected });

        // Clear iframe mutation space
        var iframeDoc = mutationFrame.contentDocument;
        while (iframeDoc.body.firstChild) iframeDoc.body.removeChild(iframeDoc.body.firstChild);
        // Remove extra head styles (keep first)
        var headStyles = iframeDoc.head.querySelectorAll('style');
        headStyles.forEach(function(style, i) { if (i > 0) style.remove(); });

        // Re-init helpers
        setupMutationHelpers();

        // Replay all versions in order
        for (var i = 0; i < codes.length; i++) {
          injectCode(codes[i]);
        }
        updateContext();
        log('system', 'App imported (' + codes.length + ' versions replayed).');
      } catch (err) {
        log('error', 'Import failed: ' + String(err));
      }
    }

    // --- Confirm Dialog ---
    function showConfirmDialog(count) {
      return new Promise(function(resolve) {
        var overlay = document.createElement('div');
        overlay.id = 'confirm-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';

        var dialog = document.createElement('div');
        dialog.style.cssText = 'background:var(--bg-window);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:360px;text-align:center;font-family:inherit;color:var(--text-primary);';
        dialog.innerHTML = '<p style="margin-bottom:16px;font-size:13px;line-height:1.5;">当前会话有 <strong>' + count + '</strong> 个版本未导出，导入将覆盖当前状态。是否继续？</p>' +
          '<div style="display:flex;gap:10px;justify-content:center;">' +
          '<button id="confirm-cancel" style="background:var(--btn-bg);color:var(--text-primary);border:1px solid var(--btn-border);padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;">取消</button>' +
          '<button id="confirm-ok" style="background:var(--accent);color:var(--accent-on);border:none;padding:7px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">确认</button>' +
          '</div>';

        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        dialog.querySelector('#confirm-ok').addEventListener('click', function() { overlay.remove(); resolve(true); });
        dialog.querySelector('#confirm-cancel').addEventListener('click', function() { overlay.remove(); resolve(false); });
      });
    }

    menuExport.addEventListener('click', exportApp);
    menuImport.addEventListener('click', importApp);

    // --- Context Bar (reads iframe DOM) ---
    async function updateContext() {
      try {
        var dom = mutationFrame.contentDocument.documentElement.outerHTML;
        var est = await invoke('estimate_tokens', { dom: dom });
        contextFill.style.width = est.percentage + '%';
        var maxK = Math.round(est.max_tokens / 1000);
        contextText.textContent = 'context ' + est.tokens + ' / ' + maxK + 'k (' + est.percentage.toFixed(1) + '%)';
        contextFill.classList.remove('warning', 'danger');
        if (est.percentage > 96) contextFill.classList.add('danger');
        else if (est.percentage > 72) contextFill.classList.add('warning');
      } catch (_) {}
    }

    // --- Script Injection (into iframe) ---
    function injectCode(code) {
      var iframeDoc = mutationFrame.contentDocument;
      var script = iframeDoc.createElement('script');
      script.textContent = '(async () => {\n' + code + '\n})();';
      iframeDoc.body.appendChild(script);
      script.remove();
    }

    // --- Mutation Loop ---
    async function mutate() {
      if (processing || !mutationSpaceReady) return;

      var userMsg = promptEl.value.trim();
      if (!userMsg) return;

      processing = true;
      sendBtn.classList.add('loading');
      sendArrow.style.display = 'none';
      sendSpinner.style.display = 'inline';
      promptEl.value = '';
      promptEl.disabled = true;

      try {
        log('user', userMsg);

        var dom = mutationFrame.contentDocument.documentElement.outerHTML;
        log('system', 'DOM captured (' + Math.round(dom.length / 4) + ' tokens, ' + dom.length + ' chars)');

        var result = await invoke('call_llm', {
          req: { dom: dom, instruction: userMsg },
        });

        log('system', 'LLM responded (' + result.raw.length + ' chars, code: ' + (result.code ? result.code.length + ' chars' : 'none') + ')');

        if (!result.code) {
          log('error', 'No JavaScript code block found');
          console.log('LLM raw response:', result.raw);
          return;
        }

        try {
          injectCode(result.code);
          log('system', 'Code injected into iframe.');
        } catch (injectErr) {
          log('error', 'Injection failed: ' + String(injectErr));
          console.log('Failed code:', result.code);
          return;
        }

        await invoke('save_mutation', { instruction: userMsg, code: result.code });
        log('system', 'Mutation applied.');
        promptEl.style.height = 'auto';
        updateContext();
      } catch (err) {
        log('error', String(err));
      } finally {
        processing = false;
        sendBtn.classList.remove('loading');
        sendArrow.style.display = 'inline';
        sendSpinner.style.display = 'none';
        promptEl.disabled = false;
      }
    }

    // --- Event Handlers ---
    sendBtn.addEventListener('click', mutate);

    promptEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        mutate();
      }
    });

    promptEl.addEventListener('input', function() {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + 'px';
    });

    // --- Init ---
    loadTheme();
    initMutationSpace();
    updateContext();
    promptEl.focus();
    log('system', 'Evolva initialized. Configure settings to begin.');
  </script>
</body>
</html>
